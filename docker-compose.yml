version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campus_startup_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: campus_startup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus_startup_backend
    restart: always
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/campus_startup_db?schema=public
      - JWT_SECRET=supersecretjwtkey123!
      - JWT_REFRESH_SECRET=supersecretrefreshkey456!
      - OPENAI_API_KEY=your_openai_api_key_here
      - RAZORPAY_KEY_ID=rzp_test_yourkeyid
      - RAZORPAY_KEY_SECRET=your_razorpay_secret
      - CLIENT_URL=http://localhost
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus_startup_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    container_name: campus_startup_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
